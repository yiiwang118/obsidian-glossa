name: Release

# Trigger on any tag, then fail inside the workflow if it does not exactly
# match manifest.json. GitHub Actions tag patterns are glob-like, not regex.
# Obsidian community plugins require tags WITHOUT a `v` prefix (so `0.4.0`, not `v0.4.0`).
on:
  push:
    tags:
      - '*'

permissions:
  contents: write
  id-token: write
  attestations: write

jobs:
  release:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Full pre-release check
        run: npm run check

      - name: Release metadata check (clean tree)
        run: npm run release:check

      - name: Verify version match (manifest.json vs tag)
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          MANIFEST_VERSION=$(node -e "console.log(require('./manifest.json').version)")
          if [ "$TAG" != "$MANIFEST_VERSION" ]; then
            echo "::error::Tag ($TAG) does not match manifest.json version ($MANIFEST_VERSION)."
            echo "Update manifest.json and versions.json before tagging."
            exit 1
          fi
          echo "Tag and manifest version both = $TAG"

      # Keep each executable release asset in its own signed statement. The
      # plugin directory verifies assets independently by filename and digest.
      - name: Attest main.js
        uses: actions/attest@v4
        with:
          subject-path: main.js

      - name: Attest styles.css
        uses: actions/attest@v4
        with:
          subject-path: styles.css

      - name: Verify release attestations
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh attestation verify main.js --repo "$GITHUB_REPOSITORY"
          gh attestation verify styles.css --repo "$GITHUB_REPOSITORY"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          generate_release_notes: true
          files: |
            main.js
            manifest.json
            styles.css
