name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

permissions:
  contents: read

jobs:
  test:
    name: full local check + build artifacts
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Full local check
        run: npm run check

      - name: Verify build output
        run: |
          test -s main.js || (echo "main.js missing or empty" && exit 1)
          test -s manifest.json || (echo "manifest.json missing or empty" && exit 1)
          test -s styles.css || (echo "styles.css missing or empty" && exit 1)
          ls -lh main.js manifest.json styles.css

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: glossa-build-${{ github.sha }}
          path: |
            main.js
            manifest.json
            styles.css
          retention-days: 7
